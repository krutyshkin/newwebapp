<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Поделиться в истории</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --link: var(--tg-theme-link-color, #2481cc);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #efeff4);
            --btn-color: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --section-separator: var(--tg-theme-section-separator-color, rgba(0,0,0,0.08));
            --section-bg: var(--tg-theme-section-bg-color, var(--bg));
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        /* === HERO SECTION === */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px 32px;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hero-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--btn-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .hero-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: var(--btn-color);
            opacity: 0.15;
            z-index: -1;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50%      { transform: scale(1.15); opacity: 0.05; }
        }

        .hero-icon i {
            font-size: 32px;
            color: var(--btn-text);
        }

        .hero-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .hero-subtitle {
            font-size: 15px;
            line-height: 1.5;
            color: var(--hint);
            max-width: 300px;
        }

        /* === TG-STYLE SECTION LIST === */
        .tg-section {
            background: var(--section-bg);
            margin: 0 16px 16px;
            border-radius: 12px;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out 0.1s both;
        }

        .tg-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            position: relative;
        }

        .tg-row + .tg-row {
            border-top: 0.5px solid var(--section-separator);
        }

        .tg-row-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .tg-row-icon i {
            font-size: 14px;
            color: #fff;
        }

        .tg-row-icon.blue    { background: #2481cc; }
        .tg-row-icon.purple  { background: #7c5cff; }
        .tg-row-icon.green   { background: #34c759; }

        .tg-row-content {
            flex: 1;
            min-width: 0;
        }

        .tg-row-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.3;
        }

        .tg-row-desc {
            font-size: 13px;
            color: var(--hint);
            line-height: 1.3;
            margin-top: 2px;
        }

        /* === IMAGE PREVIEW === */
        .preview-section {
            margin: 0 16px 16px;
            animation: fadeIn 0.5s ease-out 0.15s both;
        }

        .preview-label {
            font-size: 13px;
            color: var(--hint);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 4px 8px;
        }

        .preview-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .preview-strip::-webkit-scrollbar { display: none; }

        .preview-thumb {
            width: 64px;
            height: 112px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .preview-thumb.active {
            border-color: var(--btn-color);
        }

        /* === BUTTON AREA === */
        .btn-area {
            padding: 0 16px 12px;
            animation: fadeIn 0.5s ease-out 0.2s both;
        }

        .share-btn {
            width: 100%;
            padding: 15px 24px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--btn-text);
            background: var(--btn-color);
            transition: opacity 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .share-btn:active {
            transform: scale(0.985);
            opacity: 0.85;
        }

        .share-btn:disabled {
            opacity: 0.45;
            cursor: default;
            transform: none;
        }

        .share-btn i.btn-icon {
            font-size: 16px;
        }

        /* Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            display: none;
        }

        .share-btn.loading .spinner { display: block; }
        .share-btn.loading .btn-icon { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* === COUNTER === */
        .counter-text {
            text-align: center;
            font-size: 13px;
            color: var(--hint);
            padding: 4px 16px 0;
            animation: fadeIn 0.5s ease-out 0.25s both;
        }

        .counter-text span {
            color: var(--btn-color);
            font-weight: 600;
        }

        /* === ALERTS === */
        .alert {
            margin: 12px 16px 0;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .alert.show {
            display: flex;
            animation: alertIn 0.25s ease-out;
        }

        @keyframes alertIn {
            from { opacity: 0; transform: scale(0.97); }
            to   { opacity: 1; transform: scale(1); }
        }

        .alert i { font-size: 15px; flex-shrink: 0; }

        .alert-error {
            background: #fff2f0;
            color: #e53935;
        }

        .alert-success {
            background: #f0faf0;
            color: #2e7d32;
        }

        /* Dark theme overrides via TG color scheme */
        @media (prefers-color-scheme: dark) {
            .alert-error { background: rgba(229,57,53,0.12); }
            .alert-success { background: rgba(46,125,50,0.12); }
        }

        /* === FOOTER === */
        .footer {
            margin-top: auto;
            padding: 20px 16px;
            text-align: center;
            font-size: 12px;
            color: var(--hint);
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .footer i { font-size: 9px; }
    </style>
</head>
<body>

    <!-- === HERO === -->
    <div class="hero">
        <div class="hero-icon">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
        <h1 class="hero-title">Поделиться в сторис</h1>
        <p class="hero-subtitle">Опубликуйте ссылку — друзья смогут задать вам анонимный вопрос</p>
    </div>

    <!-- === HOW IT WORKS === -->
    <div class="tg-section">
        <div class="tg-row">
            <div class="tg-row-icon blue"><i class="fa-solid fa-share-from-square"></i></div>
            <div class="tg-row-content">
                <div class="tg-row-title">Нажмите кнопку ниже</div>
                <div class="tg-row-desc">Откроется редактор сторис</div>
            </div>
        </div>
        <div class="tg-row">
            <div class="tg-row-icon purple"><i class="fa-solid fa-user-secret"></i></div>
            <div class="tg-row-content">
                <div class="tg-row-title">Друзья увидят ссылку</div>
                <div class="tg-row-desc">И смогут отправить сообщение</div>
            </div>
        </div>
        <div class="tg-row">
            <div class="tg-row-icon green"><i class="fa-solid fa-eye-slash"></i></div>
            <div class="tg-row-content">
                <div class="tg-row-title">Полная анонимность</div>
                <div class="tg-row-desc">Отправитель остаётся скрытым</div>
            </div>
        </div>
    </div>

    <!-- === STORY PREVIEW THUMBNAILS === -->
    <div class="preview-section" id="previewSection">
        <div class="preview-label">Фон для сторис</div>
        <div class="preview-strip" id="previewStrip"></div>
    </div>

    <!-- === SHARE BUTTON === -->
    <div class="btn-area">
        <button class="share-btn" id="shareBtn" onclick="shareToStory()">
            <span class="spinner"></span>
            <i class="fa-solid fa-arrow-up-from-bracket btn-icon"></i>
            <span class="btn-text">Поделиться в сторис</span>
        </button>
    </div>

    <!-- === ALERTS === -->
    <div class="alert alert-error" id="errorMsg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span class="alert-text"></span>
    </div>
    <div class="alert alert-success" id="successMsg">
        <i class="fa-solid fa-circle-check"></i>
        <span class="alert-text"></span>
    </div>

    <!-- === FOOTER === -->
    <div class="footer">
        <i class="fa-solid fa-lock"></i>
        Анонимные сообщения
    </div>

    <script>
        // =====================================================
        //   КОНФИГУРАЦИЯ — МЕНЯЙТЕ ЗДЕСЬ
        // =====================================================

        // Юзернейм бота по умолчанию (если не передан через URL)
        const DEFAULT_BOT_USERNAME = 'askanons_bot';

        // Текст, который улетит в сторис (${botLink} подставится автоматически)
        const SHARE_TEXT_TEMPLATE = 'Задай мне анонимный вопрос, если сможешь \u{1F449}';

        // Название кнопки-виджета в самой сторис
        const WIDGET_BUTTON_NAME = 'Отправить вопрос';

        // Задержка перед закрытием WebApp после шаринга (мс)
        const CLOSE_DELAY_MS = 2000;

        // Картинки-фоны для сторис — чередуются по очереди (не рандом)
        // Добавляйте/удаляйте URL-ы как нужно
        const STORY_BACKGROUNDS = [
            'https://raw.githubusercontent.com/krutyshkin/pic/refs/heads/main/webapp.jpg',
            'https://sun9-76.userapi.com/s/v1/ig2/jHO17WUeWMNN-HWvv26HIYKLpiFM2u40Z0qqPKMvGcXh5G2SgP77HpEUa8pz22e6UtVbwndm7tWxPfUy4N0JDMmZ.jpg?quality=95&as=32x57,48x85,72x128,108x192,160x284,240x427,360x640,480x853,540x960,640x1138,720x1280,1080x1920&from=bu&cs=1080x0',
        ];

        // =====================================================
        //   КОД НИЖЕ — НЕ ТРОГАТЬ
        // =====================================================

        const tg = window.Telegram.WebApp;
        let selectedBgIndex = 0;

        // Init
        tg.ready();
        tg.expand();
        applyTheme();
        renderThumbnails();

        function applyTheme() {
            const root = document.documentElement;
            const tp = tg.themeParams;
            if (tp.bg_color) root.style.setProperty('--tg-theme-bg-color', tp.bg_color);
            if (tp.text_color) root.style.setProperty('--tg-theme-text-color', tp.text_color);
            if (tp.hint_color) root.style.setProperty('--tg-theme-hint-color', tp.hint_color);
            if (tp.secondary_bg_color) root.style.setProperty('--tg-theme-secondary-bg-color', tp.secondary_bg_color);
            if (tp.button_color) root.style.setProperty('--tg-theme-button-color', tp.button_color);
            if (tp.button_text_color) root.style.setProperty('--tg-theme-button-text-color', tp.button_text_color);
            if (tp.link_color) root.style.setProperty('--tg-theme-link-color', tp.link_color);
            if (tp.section_bg_color) root.style.setProperty('--tg-theme-section-bg-color', tp.section_bg_color);
            if (tp.section_separator_color) root.style.setProperty('--tg-theme-section-separator-color', tp.section_separator_color);

            // Detect dark/light for alert colors
            if (tp.bg_color) {
                const hex = tp.bg_color.replace('#', '');
                const r = parseInt(hex.substr(0,2), 16);
                const g = parseInt(hex.substr(2,2), 16);
                const b = parseInt(hex.substr(4,2), 16);
                const lum = (0.299*r + 0.587*g + 0.114*b);
                if (lum < 128) {
                    document.documentElement.style.setProperty('--alert-error-bg', 'rgba(229,57,53,0.12)');
                    document.documentElement.style.setProperty('--alert-success-bg', 'rgba(46,125,50,0.12)');
                } else {
                    document.documentElement.style.setProperty('--alert-error-bg', '#fff2f0');
                    document.documentElement.style.setProperty('--alert-success-bg', '#f0faf0');
                }
            }
        }

        // Render image thumbnails
        function renderThumbnails() {
            const strip = document.getElementById('previewStrip');
            const section = document.getElementById('previewSection');

            if (STORY_BACKGROUNDS.length <= 1) {
                section.style.display = 'none';
                return;
            }

            STORY_BACKGROUNDS.forEach((url, i) => {
                const img = document.createElement('img');
                img.src = url;
                img.className = 'preview-thumb' + (i === 0 ? ' active' : '');
                img.alt = 'Фон ' + (i + 1);
                img.onclick = () => selectBg(i);
                strip.appendChild(img);
            });
        }

        function selectBg(index) {
            selectedBgIndex = index;
            document.querySelectorAll('.preview-thumb').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            haptic('impact');
        }

        function getParams() {
            const urlParams = new URLSearchParams(window.location.search);
            let userId = urlParams.get('user_id') || urlParams.get('userid') || urlParams.get('userId');
            let botUsername = urlParams.get('bot') || urlParams.get('botusername') || urlParams.get('botUsername');

            if (!userId && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id;
            }

            if (tg.initDataUnsafe && tg.initDataUnsafe.start_param) {
                const parts = tg.initDataUnsafe.start_param.split('_');
                if (parts.length >= 2) {
                    botUsername = botUsername || parts[0];
                    userId = userId || parts[1];
                }
            }

            return { userId, botUsername };
        }

        function showError(msg) {
            const e = document.getElementById('errorMsg');
            const s = document.getElementById('successMsg');
            s.classList.remove('show');
            e.querySelector('.alert-text').textContent = msg;
            e.classList.add('show');
            haptic('error');
        }

        function showSuccess(msg) {
            const e = document.getElementById('errorMsg');
            const s = document.getElementById('successMsg');
            e.classList.remove('show');
            s.querySelector('.alert-text').textContent = msg;
            s.classList.add('show');
            haptic('success');
        }

        function haptic(type) {
            try {
                if (!tg.HapticFeedback) return;
                if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
                else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
                else tg.HapticFeedback.impactOccurred('light');
            } catch(e) {}
        }

        function setLoading(on) {
            const btn = document.getElementById('shareBtn');
            const txt = btn.querySelector('.btn-text');
            if (on) {
                btn.classList.add('loading');
                btn.disabled = true;
                txt.textContent = 'Загрузка...';
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
                txt.textContent = 'Поделиться в сторис';
            }
        }

        function shareToStory() {
            const { userId, botUsername } = getParams();

            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');

            if (!userId) {
                showError('Не удалось получить данные. Откройте WebApp заново.');
                return;
            }

            if (!tg.shareToStory) {
                showError('Поделиться в сторис недоступно. Обновите Telegram.');
                return;
            }

            haptic('impact');
            setLoading(true);

            try {
                // Берём выбранную картинку (или чередуем по кругу)
                const mediaUrl = STORY_BACKGROUNDS[selectedBgIndex % STORY_BACKGROUNDS.length];

                // Формируем ссылку
                const bot = botUsername || DEFAULT_BOT_USERNAME;
                const botLink = `https://t.me/${bot}?start=${userId}`;
                const shareText = `${SHARE_TEXT_TEMPLATE} ${botLink}`;

                tg.shareToStory(mediaUrl, {
                    text: shareText,
                    widget_link: {
                        url: botLink,
                        name: WIDGET_BUTTON_NAME
                    }
                });

                showSuccess('Открываем редактор сторис...');
                setLoading(false);

                // Сдвигаем индекс для следующего раза
                selectedBgIndex = (selectedBgIndex + 1) % STORY_BACKGROUNDS.length;
                document.querySelectorAll('.preview-thumb').forEach((el, i) => {
                    el.classList.toggle('active', i === selectedBgIndex);
                });

                setTimeout(() => { tg.close(); }, CLOSE_DELAY_MS);

            } catch (err) {
                console.error('shareToStory error:', err);
                showError('Не удалось поделиться. Попробуйте позже.');
                setLoading(false);
            }
        }
    </script>
</body>
</html>
